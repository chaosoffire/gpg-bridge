name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/gpg-bridge.exe dist/
          cd dist
          sha256sum gpg-bridge.exe > gpg-bridge.exe.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/gpg-bridge.exe
            dist/gpg-bridge.exe.sha256